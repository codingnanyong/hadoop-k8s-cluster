apiVersion: v1
kind: ConfigMap
metadata:
  name: livy-config
  namespace: hadoop
data:
  livy.conf: |
    # ── 서버 기본 설정 ─────────────────────────────────────
    livy.server.host = 0.0.0.0
    livy.server.port = 8998

    # ── Spark on YARN 설정 ─────────────────────────────────
    livy.spark.master = yarn
    livy.spark.deployMode = cluster

    # ── Hive Context 활성화 (Hive Metastore 연동) ──────────
    livy.repl.enable-hive-context = true

    # ── 세션 관리 ──────────────────────────────────────────
    # 배치 잡 위주이므로 세션 타임아웃을 짧게 유지
    livy.server.session.timeout = 1h
    livy.server.session.state-retain.sec = 600s

    # ── 보안 (개발 환경 - 비활성화) ───────────────────────
    livy.impersonation.enabled = false

    # ── 로컬 파일 허용 경로 ────────────────────────────────
    livy.file.local-dir-whitelist = /tmp

  livy-env.sh: |
    #!/usr/bin/env bash
    export JAVA_HOME=/opt/java/openjdk
    export SPARK_HOME=/opt/spark
    export HADOOP_CONF_DIR=/etc/hadoop
    export YARN_CONF_DIR=/etc/hadoop
    export LIVY_HOME=/opt/livy
    export LIVY_LOG_DIR=/opt/livy/logs
    export LIVY_PID_DIR=/opt/livy/run
    # Livy가 spark-submit 호출 시 사용할 Spark 버전
    export SPARK_SCALA_VERSION=2.12
