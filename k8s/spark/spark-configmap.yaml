apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: hadoop
data:
  spark-defaults.conf: |
    # YARN을 실행 환경으로 사용
    spark.master                        yarn
    spark.submit.deployMode             cluster

    # HDFS 주소
    spark.hadoop.fs.defaultFS           hdfs://hdfs-namenode:8020

    # Spark jar 파일을 HDFS staging 디렉토리에 업로드 (executor가 다운로드)
    spark.yarn.stagingDir               hdfs:///spark-staging

    # 잡 이벤트 로그 (Spark History Server 연동용)
    spark.eventLog.enabled              true
    spark.eventLog.dir                  hdfs:///spark-logs

    # Executor 기본 자원 설정
    spark.executor.memory               1g
    spark.executor.cores                1
    spark.driver.memory                 1g

    # YARN 컨테이너 환경변수 전달
    spark.yarn.appMasterEnv.HADOOP_CONF_DIR   /etc/hadoop
    spark.yarn.executorEnv.HADOOP_CONF_DIR    /etc/hadoop

    # Hive Metastore 연동
    spark.sql.catalogImplementation           hive
    spark.sql.hive.metastore.uris             thrift://hive-metastore:9083
    spark.sql.warehouse.dir                   hdfs:///warehouse
    spark.hadoop.hive.metastore.uris          thrift://hive-metastore:9083
