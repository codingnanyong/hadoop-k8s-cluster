apiVersion: v1
kind: Service
metadata:
  name: spark-thriftserver
  namespace: hadoop
spec:
  type: NodePort
  selector:
    app: spark-thriftserver
  ports:
    - name: thrift
      port: 10000
      targetPort: 10000
      nodePort: 30100    # JDBC: hive2://YOUR_NODE_IP:30100
    # Spark UI (4040) is proxied via YARN — use YARN RM UI:
    # http://YOUR_NODE_IP:30890/cluster/apps
