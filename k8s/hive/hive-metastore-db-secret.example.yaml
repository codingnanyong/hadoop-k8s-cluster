# Example only — copy to hive-metastore-db-secret.yaml (gitignored), edit values, then apply.
# Never commit real hostnames, JDBC URLs, usernames, or passwords.
#
#   cp k8s/hive/hive-metastore-db-secret.example.yaml k8s/hive/hive-metastore-db-secret.yaml
#
# Prefer in-cluster PostgreSQL (Service DNS) over a bare node IP.
apiVersion: v1
kind: Secret
metadata:
  name: hive-metastore-db
  namespace: hadoop
type: Opaque
stringData:
  # e.g. jdbc:postgresql://postgresql.database.svc.cluster.local:5432/metastore
  connection-url: "jdbc:postgresql://REPLACE_POSTGRES_HOST:5432/metastore"
  username: "REPLACE_DB_USER"
  password: "REPLACE_DB_PASSWORD"
