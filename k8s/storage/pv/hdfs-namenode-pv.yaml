apiVersion: v1
kind: PersistentVolume
metadata:
  name: hdfs-namenode-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-hdfs
  # Host path must exist on the target node; adjust to match your disks/layout.
  local:
    path: /var/lib/hadoop-k8s/hdfs-namenode
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-01
